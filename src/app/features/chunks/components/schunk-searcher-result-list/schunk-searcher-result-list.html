<div class="card-body d-flex flex-wrap mb-3">
  <p class="mb-3"><strong>Resultados (ordenados por relevancia):</strong></p>

  @if (isLoading()) {
    <p>Cargando resultados...</p>
  } @else if (error()) {
    <p class="text-danger">{{ error() }}</p>
  } @else if (resultados().length === 0) {
    <p class="text-muted">No hay resultados.</p>
  } @else {
    <div class="d-flex flex-column gap-3">
      @for (resultado of resultados(); track resultado.id) {
        <app-schunk-searcher-result-detail
          [resultado]="resultado"
          [modo]="modo()"
        ></app-schunk-searcher-result-detail>
      }
    </div>
  }
</div>
