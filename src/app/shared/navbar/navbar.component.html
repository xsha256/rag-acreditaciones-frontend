<nav class="navbar navbar-expand-lg" style="background: var(--gradient-primary);">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold text-white" routerLink="/">
      <i class="bi bi-file-earmark-text me-2"></i>RAG Acreditaciones
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMain"
      aria-controls="navbarMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">

        @if (authService.isLoggedIn()) {
          <li class="nav-item">
            <a
              class="nav-link text-white"
              routerLink="/documentos"
              routerLinkActive="fw-bold"
              [routerLinkActiveOptions]="{ exact: false }"
            >Documentos</a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link text-white"
              routerLink="/chunks"
              routerLinkActive="fw-bold"
              [routerLinkActiveOptions]="{ exact: false }"
            >Chunks</a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link text-white"
              routerLink="/chats"
              routerLinkActive="fw-bold"
              [routerLinkActiveOptions]="{ exact: false }"
            >Chats</a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link text-white"
              routerLink="/feedback"
              routerLinkActive="fw-bold"
              [routerLinkActiveOptions]="{ exact: false }"
            >Feedback</a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link text-white"
              routerLink="/informes"
              routerLinkActive="fw-bold"
              [routerLinkActiveOptions]="{ exact: false }"
            >Informes</a>
          </li>

          <li class="nav-item ms-lg-3">
            <div class="d-flex align-items-center gap-2">
              <span class="text-white-50 small">
                <i class="bi bi-person-circle me-1"></i>{{ authService.getNickname() }}
              </span>
              <button
                class="btn btn-sm btn-outline-light"
                (click)="authService.logout()"
              >
                <i class="bi bi-box-arrow-right me-1"></i>Salir
              </button>
            </div>
          </li>
        } @else {
          <li class="nav-item ms-lg-2">
            <a class="btn btn-sm btn-light fw-semibold" routerLink="/registro">
              <i class="bi bi-person-plus me-1"></i>Registrarse
            </a>
          </li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-sm btn-light fw-semibold" routerLink="/login">
              <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesión
            </a>
          </li>
        }

      </ul>
    </div>
  </div>
</nav>
